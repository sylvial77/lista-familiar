*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;background:#FAFAF8;color:#2D2D2D;max-width:480px;margin:0 auto;min-height:100vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.select-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;background:linear-gradient(180deg,#FAFAF8 0%,#F0EDE6 100%)}
.logo-title{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.logo-sub{font-size:16px;color:#888;margin-top:8px;margin-bottom:40px}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:340px}
.member-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:20px 12px;border-radius:16px;border:2.5px solid;background:#fff;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.04);font-family:inherit;font-size:inherit}
.member-card:active{transform:scale(0.96)}
.member-card .emoji{font-size:36px}
.member-card .name{font-size:15px;font-weight:700}
.app{display:none}
.app.active{display:block}
.header{padding:20px 20px 24px;border-radius:0 0 28px 28px;color:#fff}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.back-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:6px 14px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:600;font-family:inherit}
.header-user{display:flex;align-items:center;gap:8px;font-weight:600;font-size:15px}
.header-title{font-size:24px;font-weight:800;letter-spacing:-0.3px}
.header-count{font-size:14px;margin-top:6px;opacity:0.9}
.online-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px;font-size:11px;font-weight:600;color:#81B29A;background:#81B29A15}
.online-dot{width:6px;height:6px;border-radius:50%;background:#81B29A;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.online-bar.offline{color:#E07A5F;background:#E07A5F15}
.online-bar.offline .online-dot{background:#E07A5F;animation:none}
.add-section{padding:16px 20px 8px}
.input-row{display:flex;gap:10px}

.input-row input:focus{border-color:#aaa}
