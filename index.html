<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2D2D2D">
<title>Lista Familiar 🛒</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #FAFAF8;
    color: #2D2D2D;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ===== MEMBER SELECT ===== */
  .select-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; min-height: 100dvh; padding: 32px;
    background: linear-gradient(180deg, #FAFAF8 0%, #F0EDE6 100%);
  }
  .logo-icon { font-size: 56px; display: block; margin-bottom: 12px; }
  .logo-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-sub { font-size: 16px; color: #888; margin-top: 8px; margin-bottom: 40px; }
  .member-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    width: 100%; max-width: 340px;
  }
  .member-card {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 20px 12px; border-radius: 16px; border: 2.5px solid;
    background: #fff; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04); font-family: inherit; font-size: inherit;
  }
  .member-card:active { transform: scale(0.96); }
  .member-card .emoji { font-size: 36px; }
  .member-card .name { font-size: 15px; font-weight: 700; }

  /* ===== MAIN APP ===== */
  .app { display: none; }
  .app.active { display: block; }

  .header { padding: 20px 20px 24px; border-radius: 0 0 28px 28px; color: #fff; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .back-btn {
    background: rgba(255,255,255,0.2); border: none; color: #fff;
    padding: 6px 14px; border-radius: 20px; font-size: 13px;
    cursor: pointer; font-weight: 600; font-family: inherit;
  }
  .header-user { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 15px; }
  .header-title { font-size: 24px; font-weight: 800; letter-spacing: -0.3px; }
  .header-count { font-size: 14px; margin-top: 6px; opacity: 0.9; }

  /* ===== ONLINE INDICATOR ===== */
  .online-bar {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    padding: 6px; font-size: 11px; font-weight: 600; color: #81B29A;
    background: #81B29A15;
  }
  .online-dot {
    width: 6px; height: 6px; border-radius: 50%; background: #81B29A;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; } 50% { opacity: 0.4; }
  }
  .online-bar.offline { color: #E07A5F; background: #E07A5F15; }
  .online-bar.offline .online-dot { background: #E07A5F; animation: none; }

  /* ===== ADD SECTION ===== */
  .add-section { padding: 16px 20px 8px; }
  .input-row { display: flex; gap: 10px; }
  .input-row input {
    flex: 1; padding: 14px 18px; border-radius: 16px; border: 2px solid #E8E6E0;
    font-size: 16px; outline: none; background: #fff; font-family: inherit;
    transition: border 0.2s;
  }
  .input-row input:focus { border-color: #aaa; }
  .add-btn {
    width: 50px; height: 50px; border-radius: 16px; border: none; color: #fff;
    font-size: 24px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s; font-family: inherit;
  }
  .add-btn:active { transform: scale(0.95); }

  .cat-row {
    display: flex; gap: 6px; overflow-x: auto; padding: 12px 0 4px;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .cat-row::-webkit-scrollbar { display: none; }
  .cat-chip {
    padding: 6px 12px; border-radius: 20px; border: 1.5px solid transparent;
    font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap;
    transition: all 0.2s; font-family: inherit; background: #f5f5f5; color: #888;
  }
  .cat-chip.active { border-color: currentColor; }

  /* ===== LIST ===== */
  .list-area { padding: 8px 20px 100px; }
  .group { margin-bottom: 20px; }
  .group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding-left: 4px; }
  .group-label { font-size: 13px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
  .group-count { font-size: 11px; background: #E8E6E0; color: #888; border-radius: 10px; padding: 1px 8px; font-weight: 700; }

  .item {
    display: flex; align-items: center; gap: 10px; padding: 12px 14px;
    background: #fff; border-radius: 14px; margin-bottom: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04); animation: slideIn 0.25s ease-out;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .item-check {
    background: none; border: none; cursor: pointer; padding: 4px;
    font-size: 18px; opacity: 0.3; transition: opacity 0.2s;
  }
  .item-content { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .item-text { font-size: 15px; font-weight: 600; color: #2D2D2D; }
  .item-member { font-size: 11px; font-weight: 600; }
  .delete-btn {
    background: none; border: none; cursor: pointer; color: #ccc;
    font-size: 14px; padding: 6px; border-radius: 8px; font-family: inherit;
  }

  /* ===== COMPLETED ===== */
  .completed-toggle {
    display: flex; justify-content: space-between; align-items: center; width: 100%;
    background: #F0EDE6; border: none; border-radius: 14px; padding: 12px 16px;
    font-size: 14px; font-weight: 700; color: #888; cursor: pointer;
    font-family: inherit; margin-bottom: 8px;
  }
  .completed-item {
    display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    background: #F9F8F5; border-radius: 12px; margin-bottom: 4px;
  }
  .completed-item .c-text { flex: 1; font-size: 14px; color: #bbb; text-decoration: line-through; }
  .clear-btn {
    width: 100%; padding: 10px; background: none; border: 1.5px dashed #ddd;
    border-radius: 12px; color: #aaa; font-size: 13px; font-weight: 600;
    cursor: pointer; margin-top: 8px; font-family: inherit;
  }

  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-state .icon { font-size: 48px; }
  .empty-state p { color: #aaa; font-size: 15px; margin-top: 12px; }

  /* ===== LOADING ===== */
  .loading-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px;
  }
  .spinner {
    width: 40px; height: 40px; border: 3px solid #E8E6E0; border-top-color: #81B29A;
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
  <span style="font-size:48px">🛒</span>
  <div class="spinner"></div>
  <p style="color:#aaa;font-size:14px">Conectando...</p>
</div>

<!-- MEMBER SELECT -->
<div class="select-screen" id="selectScreen" style="display:none">
  <span class="logo-icon">🛒</span>
  <h1 class="logo-title">Lista Familiar</h1>
  <p class="logo-sub">¿Quién eres?</p>
  <div class="member-grid" id="memberGrid"></div>
</div>

<!-- MAIN APP -->
<div class="app" id="mainApp">
  <div class="online-bar" id="onlineBar">
    <span class="online-dot"></span> Conectado — sincronizado en tiempo real
  </div>
  <div class="header" id="header">
    <div class="header-top">
      <button class="back-btn" onclick="showSelectScreen()">← Cambiar</button>
      <div class="header-user" id="headerUser"></div>
    </div>
    <h1 class="header-title">🛒 Lista Familiar</h1>
    <p class="header-count" id="headerCount"></p>
  </div>
  <div class="add-section">
    <div class="input-row">
      <input type="text" id="newItemInput" placeholder="¿Qué hace falta?" onkeydown="if(event.key==='Enter')addItem()">
      <button class="add-btn" id="addBtn" onclick="addItem()">+</button>
    </div>
    <div class="cat-row" id="catRow"></div>
  </div>
  <div class="list-area" id="listArea"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// =====================================================
//  🔧 CONFIGURACIÓN FIREBASE — RELLENA CON TUS DATOS
// =====================================================
const firebaseConfig = {
  apiKey: "AIzaSyCpKNJzLzDvHdskgzCYoCfSWR-FIuZv1pw",
  databaseURL: "https://lista-familiar-a5720-default-rtdb.europe-west1.firebasedatabase.app",
};
// =====================================================

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const itemsRef = db.ref("shopping-items");

// ===== CONFIG =====
const MEMBERS = [
  { id: "mama", name: "Sylvia", emoji: "👑", color: "#E07A5F" },
  { id: "papa", name: "Antonio", emoji: "🦁", color: "#3D85C6" },
  { id: "hijo1", name: "Diego", emoji: "⚡", color: "#81B29A" },
  { id: "hijo2", name: "Lúa", emoji: "🌙", color: "#F2CC8F" },
  { id: "otro", name: "Otro", emoji: "👽", color: "#9B72AA" }
];

const CATEGORIES = [
  { id: "frutas", label: "Frutas y Verduras", icon: "🥑" },
  { id: "carnes", label: "Carnes y Pescado", icon: "🥩" },
  { id: "lacteos", label: "Lácteos", icon: "🧀" },
  { id: "panaderia", label: "Panadería", icon: "🥖" },
  { id: "limpieza", label: "Limpieza", icon: "🧹" },
  { id: "bebidas", label: "Bebidas", icon: "🥤" },
  { id: "otros", label: "Otros", icon: "📦" }
];

// ===== STATE =====
let currentMember = null;
let selectedCategory = "otros";
let items = [];
let showCompleted = false;
let connected = false;

// ===== FIREBASE LISTENERS =====
// Listen for realtime changes
itemsRef.on("value", (snapshot) => {
  const data = snapshot.val();
  items = data ? Object.keys(data).map(key => ({ ...data[key], id: key })) : [];
  // Sort newest first
  items.sort((a, b) => (b.createdAt || "").localeCompare(a.createdAt || ""));
  
  document.getElementById("loadingScreen").style.display = "none";
  if (!currentMember) {
    showSelectScreenInit();
  }
  renderList();
});

// Connection status
db.ref(".info/connected").on("value", (snap) => {
  connected = snap.val() === true;
  updateConnectionStatus();
});

function updateConnectionStatus() {
  const bar = document.getElementById("onlineBar");
  if (!bar) return;
  if (connected) {
    bar.className = "online-bar";
    bar.innerHTML = '<span class="online-dot"></span> Conectado — sincronizado en tiempo real';
  } else {
    bar.className = "online-bar offline";
    bar.innerHTML = '<span class="online-dot"></span> Sin conexión — se sincronizará al reconectar';
  }
}

// ===== SCREENS =====
function showSelectScreenInit() {
  document.getElementById("selectScreen").style.display = "flex";
  document.getElementById("mainApp").className = "app";
  renderMemberGrid();
}

function showSelectScreen() {
  currentMember = null;
  localStorage.removeItem("lista-familiar-member");
  document.getElementById("selectScreen").style.display = "flex";
  document.getElementById("mainApp").className = "app";
}

function selectMember(id) {
  currentMember = MEMBERS.find(m => m.id === id);
  localStorage.setItem("lista-familiar-member", id);
  showMainApp();
}

function showMainApp() {
  document.getElementById("selectScreen").style.display = "none";
  document.getElementById("mainApp").className = "app active";
  document.getElementById("header").style.background = 
    `linear-gradient(135deg, ${currentMember.color}, ${currentMember.color}cc)`;
  document.getElementById("headerUser").innerHTML = 
    `<span style="font-size:20px">${currentMember.emoji}</span><span>${currentMember.name}</span>`;
  document.getElementById("addBtn").style.background = currentMember.color;
  updateConnectionStatus();
  renderCategories();
  renderList();
}

// ===== RENDER =====
function renderMemberGrid() {
  document.getElementById("memberGrid").innerHTML = MEMBERS.map(m => `
    <button class="member-card" style="border-color:${m.color}" onclick="selectMember('${m.id}')">
      <span class="emoji">${m.emoji}</span>
      <span class="name" style="color:${m.color}">${m.name}</span>
    </button>
  `).join("");
}

function renderCategories() {
  document.getElementById("catRow").innerHTML = CATEGORIES.map(cat => `
    <button class="cat-chip ${selectedCategory === cat.id ? 'active' : ''}"
            style="${selectedCategory === cat.id 
              ? `background:${currentMember.color}20;border-color:${currentMember.color};color:${currentMember.color}` 
              : ''}"
            onclick="selectCategory('${cat.id}')">
      ${cat.icon} ${cat.label.split(' ')[0]}
    </button>
  `).join("");
}

function selectCategory(id) {
  selectedCategory = id;
  renderCategories();
}

function renderList() {
  if (!currentMember) return;
  const area = document.getElementById("listArea");
  const pending = items.filter(i => !i.done);
  const completed = items.filter(i => i.done);

  document.getElementById("headerCount").textContent = 
    pending.length === 0 ? "¡No hay nada pendiente!" 
    : `${pending.length} producto${pending.length !== 1 ? 's' : ''} pendiente${pending.length !== 1 ? 's' : ''}`;

  const groups = CATEGORIES
    .map(cat => ({ ...cat, items: pending.filter(i => i.category === cat.id) }))
    .filter(g => g.items.length > 0);

  let html = "";

  if (groups.length === 0 && completed.length === 0) {
    html = `<div class="empty-state"><span class="icon">✨</span><p>¡La lista está vacía!<br>Añade lo que necesites.</p></div>`;
  } else {
    groups.forEach(group => {
      html += `<div class="group"><div class="group-header">
        <span>${group.icon}</span>
        <span class="group-label">${group.label}</span>
        <span class="group-count">${group.items.length}</span>
      </div>`;
      group.items.forEach(item => {
        const member = MEMBERS.find(m => m.id === item.addedBy);
        html += `<div class="item">
          <button class="item-check" onclick="toggleItem('${item.id}')">○</button>
          <div class="item-content">
            <span class="item-text">${esc(item.text)}</span>
            <span class="item-member" style="color:${member?.color||'#999'}">${member?.emoji||''} ${member?.name||''}</span>
          </div>
          <button class="delete-btn" onclick="removeItem('${item.id}')">✕</button>
        </div>`;
      });
      html += `</div>`;
    });

    if (completed.length > 0) {
      html += `<button class="completed-toggle" onclick="toggleShowCompleted()">
        <span>✅ Comprados (${completed.length})</span><span>${showCompleted ? '▲' : '▼'}</span>
      </button>`;
      if (showCompleted) {
        completed.forEach(item => {
          const member = MEMBERS.find(m => m.id === item.addedBy);
          html += `<div class="completed-item">
            <button class="item-check" style="opacity:1;color:#81B29A" onclick="toggleItem('${item.id}')">●</button>
            <span class="c-text">${esc(item.text)}</span>
            <span style="font-size:12px;color:#bbb">${member?.emoji||''}</span>
          </div>`;
        });
        html += `<button class="clear-btn" onclick="clearCompleted()">🗑 Limpiar comprados</button>`;
      }
    }
  }
  area.innerHTML = html;
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// ===== ACTIONS =====
function addItem() {
  const input = document.getElementById("newItemInput");
  const text = input.value.trim();
  if (!text || !currentMember) return;
  
  itemsRef.push({
    text,
    category: selectedCategory,
    addedBy: currentMember.id,
    done: false,
    createdAt: new Date().toISOString()
  });
  input.value = "";
  input.focus();
}

function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (item) itemsRef.child(id).update({ done: !item.done });
}

function removeItem(id) {
  itemsRef.child(id).remove();
}

function clearCompleted() {
  items.filter(i => i.done).forEach(i => itemsRef.child(i.id).remove());
  showCompleted = false;
}

function toggleShowCompleted() {
  showCompleted = !showCompleted;
  renderList();
}

// ===== AUTO-LOGIN =====
const saved = localStorage.getItem("lista-familiar-member");
if (saved) {
  const found = MEMBERS.find(m => m.id === saved);
  if (found) { currentMember = found; }
}
</script>
</body>
</html>
